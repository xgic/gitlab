name: Bug report
description: Report a problem with the GitLab EE stack, Compose definitions, images, or docs
title: "bug: "
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for a report. Questions belong in [Discussions](https://github.com/xgic/gitlab/discussions).
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker/Compose versions, image tags if known
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety
      options:
        - label: This report does not include private hosts, private tracker IDs, internal paths, or secrets
          required: true
