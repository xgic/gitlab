# XGIC GitLab — template Docker Compose stack (consumer)
#
# - Official GitLab EE + PostgreSQL + Redis (vendor images, unaltered)
# - Production XGIC orchestration image: ghcr.io/xgic/xgic-gitlab
#   (built by https://github.com/xgic/gitlab-dev — not this repo)
#
# Startup: xgic-gitlab starts first (ops available even if GitLab EE is slow).
# Destructive ops should still wait for GitLab EE readiness inside commands.
#
# Usage:
#   cp .env.example .env
#   docker compose config
#   docker compose up -d

name: xgic-gitlab

services:
  # Primary XGIC orchestration service (starts first; not blocked on GitLab EE healthy)
  xgic-gitlab:
    image: ${XGIC_GITLAB_IMAGE:-ghcr.io/xgic/xgic-gitlab}:${XGIC_GITLAB_TAG:-latest}
    container_name: xgic-gitlab
    restart: unless-stopped
    ports:
      - "${XGIC_GITLAB_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-UTC}
      # Optional: non-production GitLab URL for ops tools (never hard-code production hosts in files)
      # GITLAB_URL: ${GITLAB_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gitlab-ee:
    image: gitlab/gitlab-ee:${GITLAB_VERSION:-18.11.7-ee.0}
    container_name: gitlab-ee
    restart: unless-stopped
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL:-http://localhost:8929}'
        postgresql['enable'] = false
        gitlab_rails['db_adapter'] = 'postgresql'
        gitlab_rails['db_encoding'] = 'unicode'
        gitlab_rails['db_host'] = 'postgres'
        gitlab_rails['db_port'] = 5432
        gitlab_rails['db_username'] = '${POSTGRES_USER:-gitlab}'
        gitlab_rails['db_password'] = '${POSTGRES_PASSWORD:-CHANGE_ME_STRONG}'
        gitlab_rails['db_database'] = '${POSTGRES_DB:-gitlabhq_production}'
        redis['enable'] = false
        gitlab_rails['redis_host'] = 'redis'
        gitlab_rails['redis_port'] = 6379
      TZ: ${TZ:-UTC}
    ports:
      - "${GITLAB_HTTP_PORT:-8929}:80"
      - "${GITLAB_SSH_PORT:-2224}:22"
    volumes:
      - ${GITLAB_DATA_DIR:-./gitlab-data}:/var/opt/gitlab
      - ${GITLAB_LOGS_DIR:-./gitlab-logs}:/var/log/gitlab
      - ${GITLAB_CONFIG_DIR:-./gitlab-config}:/etc/gitlab
      - ${GITLAB_BACKUPS_DIR:-./gitlab-backups}:/var/opt/gitlab/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    shm_size: "256m"

  postgres:
    image: postgres:${POSTGRES_VERSION:-18}
    container_name: gitlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitlabhq_production}
      POSTGRES_USER: ${POSTGRES_USER:-gitlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG}
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gitlab} -d ${POSTGRES_DB:-gitlabhq_production}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:${REDIS_VERSION:-8.8}-alpine
    container_name: gitlab-redis
    restart: unless-stopped
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  default:
    name: xgic-gitlab-net

