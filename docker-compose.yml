# =============================================
# XGIC GitLab — Optimized Production Compose Stack
# GitLab EE + PostgreSQL + supporting services
#
# This is a generalized, configuration-driven definition.
# Version pins and external services recommended for production.
#
# Usage:
#   cp .env.example .env && $EDITOR .env
#   docker compose config   # validate
#   docker compose up -d
#
# For container / environment tasks prefer `xde` (see AGENTS.md).
# No Makefiles are used in this project.
#
# High-level coordination for the GitLab migration effort and public exemplary launches
# Human verification and approval required before any remote action or merge to main.
# =============================================

name: xgic-gitlab

services:
  gitlab:
    # Official GitLab EE image — always pin a specific version for production
    image: gitlab/gitlab-ee:${GITLAB_VERSION:-18.11.6-ee.0}
    container_name: gitlab
    restart: unless-stopped
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL:-http://localhost:8929}'
        # Production omnibus settings (add as needed)
        # gitlab_rails['time_zone'] = 'UTC'
        # gitlab_rails['backup_path'] = '/var/opt/gitlab/backups'
      TZ: ${TZ:-UTC}
    ports:
      - "8929:80"
      - "2224:22"
    volumes:
      - ${GITLAB_DATA_DIR:-./gitlab-data}:/var/opt/gitlab
      - ${GITLAB_LOGS_DIR:-./gitlab-logs}:/var/log/gitlab
      - ${GITLAB_CONFIG_DIR:-./gitlab-config}:/etc/gitlab
      # Backup volume (recommended for production gitlab-backup rake tasks)
      - ${GITLAB_BACKUPS_DIR:-./gitlab-backups}:/var/opt/gitlab/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    shm_size: '256m'
    # Production resource recommendations (adjust per load)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    # For HTTPS production: set external_url to https://... and provide certs via volume or Omnibus config
    # Recommended: Use external reverse proxy (e.g. Traefik/Nginx) or GitLab's built-in Let's Encrypt

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: gitlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitlabhq_production}
      POSTGRES_USER: ${POSTGRES_USER:-gitlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG}
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitlab} -d ${POSTGRES_DB:-gitlabhq_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # For production: add resource limits and consider dedicated network

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: gitlab-redis
    restart: unless-stopped
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Always included (lightweight and recommended for GitLab caching/sidekiq)
    # Production: add resource limits as needed

# Profiles for environment-specific stacks
# `docker compose up`          : gitlab + postgres (quick start)
# `docker compose --profile prod up` : includes redis + full prod recommendations

networks:
  default:
    name: xgic-gitlab-net

# Volumes are declared via bind mounts in this example for simplicity.
# For named volumes in some environments, switch the paths in .env and compose.
